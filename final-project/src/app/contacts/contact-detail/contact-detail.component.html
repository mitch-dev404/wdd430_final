<div class="panel panel-primary">
  <div class="panel-heading">
    <h3 class="text-primary">{{ contact.name }}</h3>
    <div class="flex-2">
      <div class="btn-box">
        <a href="#" class="btn btn-primary" [routerLink]="['/drugs', contact.id, 'edit']">Edit</a>
        <a class="btn btn-danger" (click)="onDelete()">Delete</a>
      </div>
    </div>
  </div>
  <div class="panel-body">
    <p class="small"><span class="text-primary">Brands:</span> {{ contact.brands }}</p>
    <p class="small"><span class="text-primary">Class:</span> {{ contact.className }}</p>
    <p class="small"><span class="text-primary">Side Effects:</span> {{ contact.sideEffects }}</p>
    <p class="small"><span class="text-primary">Uses:</span> {{ contact.uses }}</p>
    <p class="small"><span class="text-primary">Controlled:</span> {{ contact.controlled }}</p>
  </div>
</div>
